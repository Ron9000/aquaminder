name: AquaMinder

options:
  bundleIdPrefix: com.gstack
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    APP_GROUP_IDENTIFIER: group.com.gstack.aquaminder.shared
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CLANG_ENABLE_MODULES: YES
    SWIFT_EMIT_LOC_STRINGS: NO

targets:
  AquaMinderCore:
    type: framework.static
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AquaMinderCore/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gstack.aquaminder.core
        GENERATE_INFOPLIST_FILE: YES
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES

  AquaMinderWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: AquaMinderWidget/Support/Info.plist
    entitlements:
      path: AquaMinderWidget/Support/AquaMinderWidget.entitlements
    sources:
      - path: AquaMinderWidget/Sources
      - path: AquaMinderWidget/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gstack.aquaminder.widget
        CODE_SIGN_ENTITLEMENTS: AquaMinderWidget/Support/AquaMinderWidget.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
    dependencies:
      - target: AquaMinderCore

  AquaMinder:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: AquaMinder/Support/Info.plist
    entitlements:
      path: AquaMinder/Support/AquaMinder.entitlements
    sources:
      - path: AquaMinder/Sources
      - path: AquaMinder/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gstack.aquaminder
        CODE_SIGN_ENTITLEMENTS: AquaMinder/Support/AquaMinder.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: AquaMinderCore
      - target: AquaMinderWidget
        embed: true

  AquaMinderCoreTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AquaMinderCoreTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gstack.aquaminder.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        BUNDLE_LOADER: ""
    dependencies:
      - target: AquaMinderCore

schemes:
  AquaMinder:
    build:
      targets:
        AquaMinder: all
    test:
      config: Debug
      targets:
        - name: AquaMinderCoreTests
    run:
      config: Debug
    archive:
      config: Release

